<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CWNU Community Raw Screenshot Contact Sheet</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-strong: #f8fbff;
      --text: #14213d;
      --muted: #5c677d;
      --border: #d8e0ee;
      --accent: #155bb5;
      --accent-contrast: #ffffff;
      --danger: #dc2626;
      --shadow: rgba(15, 23, 42, 0.12);
      --overlay: rgba(7, 12, 24, 0.82);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: #1f2937;
        --panel-strong: #243244;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --border: #374151;
        --accent: #60a5fa;
        --accent-contrast: #08111f;
        --danger: #f87171;
        --shadow: rgba(0, 0, 0, 0.38);
        --overlay: rgba(0, 0, 0, 0.86);
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.modal-open { overflow: hidden; }

    header {
      max-width: 1280px;
      margin: 0 auto 24px;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: end;
      flex-wrap: wrap;
    }

    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 6px 0; color: var(--muted); }
    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .summary {
      min-width: 220px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 8px 18px var(--shadow);
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 22px var(--shadow);
      overflow: hidden;
    }

    .thumb-button {
      display: block;
      width: 100%;
      height: 150px;
      padding: 10px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 78%, var(--panel));
      cursor: zoom-in;
    }

    .thumb-button:hover,
    .thumb-button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 45%, transparent);
      outline-offset: -3px;
    }

    .thumb-button img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .meta { padding: 10px 12px 12px; }
    .no {
      display: inline-block;
      min-width: 34px;
      margin-bottom: 6px;
      color: var(--accent);
      font-weight: 700;
    }
    .name {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      user-select: text;
    }
    .info { margin-top: 8px; font-size: 12px; color: var(--muted); }

    .viewer[hidden] { display: none; }
    .viewer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 18px;
      background: var(--overlay);
      color: #f8fafc;
    }

    .viewer-bar,
    .viewer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .viewer-title {
      min-width: 0;
    }

    .viewer-count {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-weight: 700;
      font-size: 13px;
    }

    .viewer-name,
    .viewer-path {
      margin: 5px 0 0;
      color: #e5e7eb;
      overflow-wrap: anywhere;
      user-select: text;
    }

    .viewer-path { color: #cbd5e1; font-size: 14px; }

    .viewer-stage {
      min-height: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .image-wrap {
      min-width: 0;
      min-height: 0;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .viewer-image {
      max-width: 100%;
      max-height: calc(100vh - 190px);
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.55);
      background: #0f172a;
    }

    .viewer-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: end;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 9px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.12);
      color: #f8fafc;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-1px);
      outline: none;
    }

    .btn:active { transform: translateY(0); }
    .btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); font-weight: 700; }
    .btn.danger { background: rgba(220, 38, 38, 0.22); border-color: rgba(248, 113, 113, 0.65); }
    .nav-btn { min-width: 48px; min-height: 54px; font-size: 24px; }
    .copy-status { min-height: 20px; color: #bfdbfe; font-size: 13px; }

    @media (max-width: 760px) {
      body { padding: 18px; }
      .viewer { padding: 12px; }
      .viewer-stage { grid-template-columns: 1fr; }
      .nav-btn { display: none; }
      .viewer-image { max-height: calc(100vh - 260px); }
      .viewer-bar,
      .viewer-footer { align-items: start; flex-direction: column; }
      .viewer-actions { justify-content: start; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CWNU Community Raw Screenshot Contact Sheet</h1>
      <p>원본 위치: <code>docs/screenshots/raw</code></p>
      <p>썸네일을 클릭하면 이 페이지 안에서 큰 이미지가 열립니다. 좌우 방향키로 이전/다음 이미지를 볼 수 있습니다.</p>
    </div>
    <div class="summary">이미지 수: <strong id="imageCount"></strong>개<br>정렬: 파일명 오름차순</div>
  </header>

  <main class="grid" id="grid" aria-label="raw 스크린샷 목록"></main>

  <section class="viewer" id="viewer" hidden aria-modal="true" role="dialog" aria-labelledby="viewerName">
    <div class="viewer-bar">
      <div class="viewer-title">
        <span class="viewer-count" id="viewerCount"></span>
        <p class="viewer-name" id="viewerName"></p>
        <p class="viewer-path" id="viewerPath"></p>
      </div>
      <div class="viewer-actions">
        <button class="btn" type="button" id="copySource">source 경로 복사</button>
        <a class="btn" id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">원본 새 탭 열기</a>
        <button class="btn danger" type="button" id="closeViewer">닫기</button>
      </div>
    </div>

    <div class="viewer-stage">
      <button class="btn nav-btn" type="button" id="prevImage" aria-label="이전 이미지">‹</button>
      <div class="image-wrap">
        <img class="viewer-image" id="viewerImage" alt="">
      </div>
      <button class="btn nav-btn" type="button" id="nextImage" aria-label="다음 이미지">›</button>
    </div>

    <div class="viewer-footer">
      <div class="copy-status" id="copyStatus" aria-live="polite"></div>
      <div class="viewer-actions">
        <button class="btn" type="button" id="prevImageFooter">이전</button>
        <button class="btn primary" type="button" id="nextImageFooter">다음</button>
      </div>
    </div>
  </section>

    const grid = document.getElementById('grid');
    const imageCount = document.getElementById('imageCount');
    const viewer = document.getElementById('viewer');
    const viewerImage = document.getElementById('viewerImage');
    const viewerCount = document.getElementById('viewerCount');
    const viewerName = document.getElementById('viewerName');
    const viewerPath = document.getElementById('viewerPath');
    const openOriginal = document.getElementById('openOriginal');
    const copySource = document.getElementById('copySource');
    const copyStatus = document.getElementById('copyStatus');
    const closeViewer = document.getElementById('closeViewer');
    const prevImage = document.getElementById('prevImage');
    const nextImage = document.getElementById('nextImage');
    const prevImageFooter = document.getElementById('prevImageFooter');
    const nextImageFooter = document.getElementById('nextImageFooter');

    let currentIndex = 0;
    let lastFocused = null;

    imageCount.textContent = images.length;

    function createCard(item, index) {
      const card = document.createElement('article');
      card.className = 'card';

      const button = document.createElement('button');
      button.className = 'thumb-button';
      button.type = 'button';
      button.dataset.index = String(index);
      button.setAttribute('aria-label', item.no + '번 이미지 크게 보기: ' + item.name);

      const img = document.createElement('img');
      img.src = item.href;
      img.alt = item.name;
      img.loading = 'lazy';
      button.appendChild(img);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = '<span class="no">#' + item.no + '</span><p class="name"></p><div class="info"></div>';
      meta.querySelector('.name').textContent = item.name;
      meta.querySelector('.info').textContent = item.resolution + ' · ' + item.size;

      button.addEventListener('click', () => openViewer(index));
      card.appendChild(button);
      card.appendChild(meta);
      return card;
    }

    function renderGrid() {
      const fragment = document.createDocumentFragment();
      images.forEach((item, index) => fragment.appendChild(createCard(item, index)));
      grid.appendChild(fragment);
    }

    function normalizeIndex(index) {
      if (!images.length) return 0;
      return (index + images.length) % images.length;
    }

    function showImage(index) {
      currentIndex = normalizeIndex(index);
      const item = images[currentIndex];
      viewerImage.src = item.href;
      viewerImage.alt = item.name;
      viewerCount.textContent = item.no + ' / ' + images.length;
      viewerName.textContent = item.name;
      viewerPath.textContent = item.source;
      openOriginal.href = item.href;
      copyStatus.textContent = '';
    }

    function openViewer(index) {
      lastFocused = document.activeElement;
      viewer.hidden = false;
      document.body.classList.add('modal-open');
      showImage(index);
      closeViewer.focus();
    }

    function hideViewer() {
      viewer.hidden = true;
      document.body.classList.remove('modal-open');
      viewerImage.removeAttribute('src');
      copyStatus.textContent = '';
      if (lastFocused && typeof lastFocused.focus === 'function') {
        lastFocused.focus();
      }
    }

    function showPrev() { showImage(currentIndex - 1); }
    function showNext() { showImage(currentIndex + 1); }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(textarea);
      return ok;
    }

    copySource.addEventListener('click', async () => {
      const source = images[currentIndex].source;
      try {
        const copied = await copyText(source);
        copyStatus.textContent = copied ? '복사됨: ' + source : '복사에 실패했습니다. 파일명을 직접 선택해 복사하세요.';
      } catch (error) {
        copyStatus.textContent = '복사에 실패했습니다. 파일명을 직접 선택해 복사하세요.';
      }
    });

    closeViewer.addEventListener('click', hideViewer);
    prevImage.addEventListener('click', showPrev);
    nextImage.addEventListener('click', showNext);
    prevImageFooter.addEventListener('click', showPrev);
    nextImageFooter.addEventListener('click', showNext);

    viewer.addEventListener('click', (event) => {
      if (event.target === viewer) hideViewer();
    });

    document.addEventListener('keydown', (event) => {
      if (viewer.hidden) return;
      if (event.key === 'Escape') {
        event.preventDefault();
        hideViewer();
      } else if (event.key === 'ArrowLeft') {
        event.preventDefault();
        showPrev();
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        showNext();
      }
    });

    renderGrid();
  </script>
