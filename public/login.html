<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="/register.html">회원가입</a>
    </nav>
  </header>

  <main class="page narrow">
    <section class="page-title">
      <h1>로그인</h1>
      <p>이메일과 비밀번호로 로그인합니다.</p>
    </section>

    <form class="form-panel" id="login-form">
      <label>
        이메일
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label>
        비밀번호
        <input type="password" name="password" autocomplete="current-password" required>
        <button class="password-toggle" type="button" data-password-toggle>비밀번호 보기</button>
      </label>
      <p class="form-message" id="auth-message" role="status"></p>
      <button type="submit">로그인</button>
    </form>
  </main>

  <footer class="site-footer">
    <p class="footer-title">컴퓨터공학과 | 데이터베이스개론 과제: CWNU Community 게시판 시스템</p>
    <div class="footer-meta">
      <span>@ 2026 정이량 | OpenAI Codex · ChatGPT 협업 제작</span>
      <a class="footer-github" href="https://github.com/jeongiryang/DatabaseLanguage_NodeJS_CWNU-Community.git" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository" data-tooltip="GitHub">

    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
