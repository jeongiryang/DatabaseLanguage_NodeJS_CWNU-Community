<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <span class="auth-status" id="auth-status">로그인 상태 확인 중</span>
      <a data-auth-link="login" href="/login.html">로그인</a>
      <a data-auth-link="register" href="/register.html">회원가입</a>
      <button class="link-button" type="button" id="logout-button" hidden>로그아웃</button>
      <a class="button-link" data-requires-auth href="/post-write.html">글쓰기</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <h1>학내 커뮤니티 게시판</h1>
      <p>창원대학교 구성원을 위한 커뮤니티 게시판입니다.</p>
      <p class="current-board" id="current-board-name">전체글</p>
    </section>

    <section class="board-shortcuts" aria-label="게시판 바로가기">
      <div class="shortcut-group shortcut-group-primary">
        <h2>주요 게시판</h2>
        <div class="shortcut-links">
          <a class="board-shortcut hot" href="/?board=hot" data-board-link="hot">인기글</a>
          <a class="board-shortcut notice" href="/?board=notice" data-board-link="notice">공지사항</a>
          <a class="board-shortcut" href="/" data-board-link="all">전체글</a>
        </div>
      </div>
      <div class="shortcut-group">
        <h2>커뮤니티 게시판</h2>
        <div class="shortcut-links">
          <a class="board-shortcut" href="/?category=free" data-category-link="free">자유게시판</a>
          <a class="board-shortcut" href="/?category=study" data-category-link="study">공부이야기</a>
          <a class="board-shortcut" href="/?category=question" data-category-link="question">질문게시판</a>
          <a class="board-shortcut" href="/?category=info" data-category-link="info">정보공유</a>
          <a class="board-shortcut" href="/?category=market" data-category-link="market">중고장터</a>
          <a class="board-shortcut" href="/?category=lost" data-category-link="lost">분실물</a>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="Post list controls">
      <label>
        표시 개수
        <select id="page-size">
          <option value="10">10개</option>
          <option value="20">20개</option>
          <option value="30">30개</option>
          <option value="40">40개</option>
          <option value="50">50개</option>
        </select>
      </label>
      <label>
        정렬
        <select id="sort">
          <option value="latest">최신순</option>
          <option value="likes">좋아요순</option>
          <option value="views">조회수순</option>
          <option value="comments">댓글순</option>
        </select>
      </label>
      <form id="post-search-form">
        <label>
          검색
          <input type="search" id="post-search" name="q" placeholder="제목, 내용, 작성자">
        </label>
        <button type="submit">검색</button>
        <button type="button" id="post-search-clear">전체 보기</button>
      </form>
    </section>

    <section class="panel">
      <table class="post-table">
        <thead>
          <tr>
            <th>제목</th>
            <th>카테고리</th>
            <th>게시자</th>
            <th>등록일</th>
            <th>수정일</th>
            <th>조회수</th>
            <th>댓글</th>
            <th>좋아요</th>
            <th>싫어요</th>
          </tr>
        </thead>
        <tbody id="post-list">
          <tr>
            <td colspan="9">게시글 목록을 불러오는 중입니다.</td>
          </tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination" aria-label="Post pagination"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-title">컴퓨터공학과 | 데이터베이스개론 과제: CWNU Community 게시판 시스템</p>
    <div class="footer-meta">
      <span>@ 2026 정이량 | OpenAI Codex · ChatGPT 협업 제작</span>
      <a class="footer-github" href="https://github.com/jeongiryang/DatabaseLanguage_NodeJS_CWNU-Community.git" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository" data-tooltip="GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.77.4.08.55-.18.55-.39 0-.19-.01-.84-.01-1.53-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.55-.01-.56.63-.01 1.08.59 1.23.83.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.91-3.64-4.05 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.97c.68 0 1.36.09 2 .27 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.15-1.87 3.84-3.65 4.05.29.26.54.75.54 1.52 0 1.09-.01 1.97-.01 2.24 0 .21.15.47.55.39A8.12 8.12 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"/>
      </svg>
      </a>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
