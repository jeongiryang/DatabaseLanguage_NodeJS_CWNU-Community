<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <span class="auth-status" id="auth-status">로그인 상태 확인 중</span>
      <a data-auth-link="login" href="/login.html">로그인</a>
      <a data-auth-link="register" href="/register.html">회원가입</a>
      <button class="link-button" type="button" id="logout-button" hidden>로그아웃</button>
      <a class="button-link" data-requires-auth href="/post-write.html">글쓰기</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <h1>학내 커뮤니티 게시판</h1>
      <p>창원대학교 구성원을 위한 커뮤니티 게시판입니다.</p>
    </section>

    <section class="toolbar" aria-label="Post list controls">
      <label>
        표시 개수
        <select id="page-size">
          <option value="10">10개</option>
          <option value="20">20개</option>
          <option value="30">30개</option>
          <option value="40">40개</option>
          <option value="50">50개</option>
        </select>
      </label>
      <label>
        정렬
        <select id="sort">
          <option value="latest">최신순</option>
          <option value="likes">좋아요순</option>
          <option value="views">조회수순</option>
        </select>
      </label>
    </section>

    <section class="panel">
      <table class="post-table">
        <thead>
          <tr>
            <th>제목</th>
            <th>게시자</th>
            <th>등록일</th>
            <th>댓글</th>
            <th>좋아요</th>
            <th>싫어요</th>
          </tr>
        </thead>
        <tbody id="post-list">
          <tr>
            <td colspan="6">게시글 목록을 불러오는 중입니다.</td>
          </tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination" aria-label="Post pagination"></div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
