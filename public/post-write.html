<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <span class="auth-status" id="auth-status">로그인 상태 확인 중</span>
      <a href="/">목록</a>
      <button class="link-button" type="button" id="logout-button" hidden>로그아웃</button>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <h1 id="post-form-title">게시글 작성</h1>
      <p>로그인한 사용자만 게시글을 작성할 수 있습니다.</p>
    </section>

    <form class="form-panel" id="post-write-form">
      <label>
        카테고리
        <select name="category" required>
          <option value="notice">공지사항</option>
          <option value="free" selected>자유게시판</option>
          <option value="study">공부이야기</option>
          <option value="question">질문게시판</option>
          <option value="info">정보공유</option>
          <option value="market">중고장터</option>
          <option value="lost">분실물</option>
        </select>
      </label>
      <label>
        제목
        <input type="text" name="title" maxlength="120" placeholder="게시글 제목을 입력하세요" required>
      </label>
      <label>
        내용
        <textarea name="content" rows="10" placeholder="욕설, 비방, 개인정보 노출을 피하고 서로에게 도움이 되는 글을 작성해주세요." required></textarea>
      </label>
      <p class="form-message" id="post-message" role="status"></p>
      <button type="submit" id="post-submit-button">등록</button>
    </form>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
