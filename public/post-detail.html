<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 상세 - CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <span class="auth-status" id="auth-status">로그인 상태 확인 중</span>
      <a href="/">목록</a>
      <a class="button-link" data-requires-auth href="/post-write.html">글쓰기</a>
      <button class="link-button" type="button" id="logout-button" hidden>로그아웃</button>
    </nav>
  </header>

  <main class="page">
    <article class="panel">
      <h1 id="post-title">게시글을 불러오는 중입니다.</h1>
      <p class="category-badge" id="post-category" hidden></p>
      <p class="meta" id="post-meta"></p>
      <div class="content-block" id="post-content"></div>
      <div class="actions">
        <button type="button" id="share-post-button">공유</button>
        <button type="button" id="bookmark-button" hidden>북마크</button>
        <span class="meta" id="bookmark-status"></span>
        <button type="button" id="like-button" hidden>좋아요</button>
        <span class="meta" id="like-status"></span>
        <button type="button" id="dislike-button" hidden>싫어요</button>
        <span class="meta" id="dislike-status"></span>
        <button type="button" id="edit-post-button" hidden>수정</button>
        <button type="button" id="delete-post-button" hidden>삭제</button>
      </div>
      <p class="form-message" id="post-message" role="status"></p>
    </article>

    <section class="panel">
      <h2>댓글</h2>
      <p class="form-message" id="comment-auth-message" role="status"></p>
      <form class="comment-form" id="comment-form" hidden>
        <textarea name="content" rows="4" placeholder="따뜻한 댓글을 남겨주세요. 욕설과 비방은 삼가주세요." required></textarea>
        <label class="checkbox-label">
          <input type="checkbox" name="isAnonymous" value="true">
          익명으로 댓글 작성
        </label>
        <button type="submit">댓글 작성</button>
      </form>
      <div class="comment-list" id="comment-list">댓글을 불러오는 중입니다.</div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
