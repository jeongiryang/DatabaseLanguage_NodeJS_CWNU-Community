<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 상세 - CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <span class="auth-status" id="auth-status">로그인 상태 확인 중</span>
      <a href="/">목록</a>
      <a class="button-link" data-requires-auth href="/post-write.html">글쓰기</a>
      <button class="link-button" type="button" id="logout-button" hidden>로그아웃</button>
    </nav>
  </header>

  <main class="page">
    <article class="panel">
      <h1 id="post-title">게시글을 불러오는 중입니다.</h1>
      <p class="category-badge" id="post-category" hidden></p>
      <p class="meta" id="post-meta"></p>
      <div class="content-block" id="post-content"></div>
      <div class="actions">
        <button type="button" id="share-post-button">🔗 공유</button>
        <button type="button" id="bookmark-button" hidden>🔖 북마크</button>
        <span class="meta" id="bookmark-status"></span>
        <button type="button" id="like-button" hidden>👍 좋아요</button>
        <span class="meta" id="like-status"></span>
        <button type="button" id="dislike-button" hidden>👎 싫어요</button>
        <span class="meta" id="dislike-status"></span>
        <button type="button" id="edit-post-button" hidden>✏️ 수정</button>
        <button type="button" id="delete-post-button" hidden>🗑️ 삭제</button>
      </div>
      <p class="form-message" id="post-message" role="status"></p>
    </article>

    <section class="panel">
      <h2>댓글</h2>
      <p class="form-message" id="comment-auth-message" role="status"></p>
      <form class="comment-form" id="comment-form" hidden>
        <textarea name="content" rows="4" placeholder="따뜻한 댓글을 남겨주세요. 욕설과 비방은 삼가주세요." required></textarea>
        <label class="checkbox-label">
          <input type="checkbox" name="isAnonymous" value="true">
          익명으로 댓글 작성
        </label>
        <button type="submit">댓글 작성</button>
      </form>
      <div class="comment-list" id="comment-list">댓글을 불러오는 중입니다.</div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-title">컴퓨터공학과 | 데이터베이스개론 과제: CWNU Community 게시판 시스템</p>
    <div class="footer-meta">
      <span>@ 2026 정이량 | OpenAI Codex · ChatGPT 협업 제작</span>
      <a class="footer-github" href="https://github.com/jeongiryang/DatabaseLanguage_NodeJS_CWNU-Community.git" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository" data-tooltip="GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.77.4.08.55-.18.55-.39 0-.19-.01-.84-.01-1.53-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.55-.01-.56.63-.01 1.08.59 1.23.83.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.91-3.64-4.05 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.97c.68 0 1.36.09 2 .27 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.15-1.87 3.84-3.65 4.05.29.26.54.75.54 1.52 0 1.09-.01 1.97-.01 2.24 0 .21.15.47.55.39A8.12 8.12 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"/>
      </svg>
      </a>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
