<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 상세 - CWNU Community</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">CWNU Community</a>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="/post-write.html">글쓰기</a>
    </nav>
  </header>

  <main class="page">
    <article class="panel">
      <h1 id="post-title">게시글 제목</h1>
      <p class="meta" id="post-meta">작성자, 등록일, 조회수, 좋아요 수가 표시될 예정입니다.</p>
      <div class="content-block" id="post-content">게시글 상세 API 구현 후 본문이 표시됩니다.</div>
      <div class="actions">
        <button type="button" id="like-button">좋아요</button>
        <button type="button" id="delete-post-button">삭제</button>
      </div>
    </article>

    <section class="panel">
      <h2>댓글</h2>
      <form class="comment-form" id="comment-form">
        <textarea name="content" rows="4" placeholder="댓글을 입력하세요"></textarea>
        <button type="submit">댓글 작성</button>
      </form>
      <div id="comment-list">댓글 API 구현 후 댓글 목록이 표시됩니다.</div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/posts.js"></script>
</body>
</html>
